version: '3.8'

services:
  # AI Microservice (FastAPI + TensorFlow)
  ai-service:
    build:
      context: ./ai-model
      dockerfile: Dockerfile
    container_name: autonome-ai-service
    ports:
      - "8000:8000"
    environment:
      - AI_PORT=8000
      - DEMO_MODE=false
      - CONFIDENCE_THRESHOLD=0.45
    restart: unless-stopped

  # Backend API Service (Node.js + Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autonome-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:8000
      # Database and authentication values.
      # Note: For production, please define these in your environment or a .env file.
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - ai-service
    restart: unless-stopped

  # Frontend Web Client (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Connect to the public API url of the backend.
        # Since Vite is compiled at build-time in the container,
        # point this to the backend host accessible by the client's browser.
        - VITE_API_URL=http://localhost:5000/api
    container_name: autonome-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
